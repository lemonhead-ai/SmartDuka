services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SMARTDUKA_DATABASE_URL: sqlite+aiosqlite:///./data/smartduka.db
      SMARTDUKA_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SMARTDUKA_LLM_PROVIDER: ${LLM_PROVIDER:-openai}
    volumes:
      - smartduka_data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  smartduka_data:
