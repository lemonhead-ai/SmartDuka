services:
  - type: web
    name: smartduka-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SMARTDUKA_ENVIRONMENT
        value: production
      - key: SMARTDUKA_AUTH_COOKIE_SECURE
        value: "true"
      # The linked environment group must provide SMARTDUKA_DATABASE_URL as a
      # Supabase Session Pooler URI, alongside the model provider secrets.
      - fromGroup: SmartDuka secrets
