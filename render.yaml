services:
  - type: web
    name: smartduka-backend
    env: python
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      # Provide Featherless API Key or OpenAI API key here when setting up on Render Dashboard
      # - key: FEATHERLESS_API_KEY
      #   sync: false
